name: Auto Release

on:
  push:
    branches:
      - main
      - beta
      - production

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Get PR details
        id: pr_details
        run: |
          # Get the merge commit SHA
          MERGE_COMMIT="${{ github.sha }}"

          # Find the PR number from the merge commit
          PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid==\"$MERGE_COMMIT\") | .number")

          if [[ -n "$PR_NUMBER" ]]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

            # Get PR labels and title
            PR_LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name' | tr '\n' ',' || echo "")
            PR_TITLE=$(gh pr view $PR_NUMBER --json title --jq '.title' || echo "")

            echo "pr_labels=$PR_LABELS" >> $GITHUB_OUTPUT
            echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
            echo "Found PR #$PR_NUMBER"
            echo "Labels: $PR_LABELS"
            echo "Title: $PR_TITLE"
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "pr_labels=" >> $GITHUB_OUTPUT
            echo "pr_title=" >> $GITHUB_OUTPUT
            echo "No PR found for this merge commit"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Determine version bump type
        id: bump_type
        run: |
          PR_LABELS="${{ steps.pr_details.outputs.pr_labels }}"
          PR_TITLE="${{ steps.pr_details.outputs.pr_title }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "Analyzing version bump from:"
          echo "  PR Labels: $PR_LABELS"
          echo "  PR Title: $PR_TITLE"
          echo "  Commit message: $COMMIT_MSG"

          # Priority 1: PR Labels (highest priority)
          if echo "$PR_LABELS" | grep -qiE 'major|breaking'; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "✅ Detected from PR label: MAJOR version bump"
            exit 0
          elif echo "$PR_LABELS" | grep -qiE 'minor|feature'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "✅ Detected from PR label: MINOR version bump"
            exit 0
          elif echo "$PR_LABELS" | grep -qiE 'patch|bugfix'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "✅ Detected from PR label: PATCH version bump"
            exit 0
          fi

          # Priority 2: PR Title
          if echo "$PR_TITLE" | grep -qiE '\[major\]|BREAKING CHANGE'; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "✅ Detected from PR title: MAJOR version bump"
            exit 0
          elif echo "$PR_TITLE" | grep -qiE '\[minor\]|^feat:|feat\(|^✨'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "✅ Detected from PR title: MINOR version bump"
            exit 0
          elif echo "$PR_TITLE" | grep -qiE 'fix:|^🐛|chore:'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "✅ Detected from PR title: PATCH version bump"
            exit 0
          fi

          # Priority 3: Commit Message (fallback)
          if echo "$COMMIT_MSG" | grep -qiE '\[major\]|BREAKING CHANGE'; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "⚠️  Detected from commit message: MAJOR version bump"
          elif echo "$COMMIT_MSG" | grep -qiE '\[minor\]|^feat:|feat\(|^✨'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "⚠️  Detected from commit message: MINOR version bump"
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "ℹ️  Default: PATCH version bump"
          fi

      - name: Get latest tag and calculate new version
        id: get_tag
        run: |
          BRANCH="${{ github.ref_name }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.bump }}"

          if [[ "$BRANCH" == "main" ]]; then
            # For main: bump version in package.json, no tag/release
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

            echo "Current version: ${CURRENT_VERSION}"

            if [[ "$BUMP_TYPE" == "major" ]]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif [[ "$BUMP_TYPE" == "minor" ]]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            echo "New version: ${NEW_VERSION}"

          elif [[ "$BRANCH" == "beta" ]]; then
            # For beta: read version from main's package.json, create prerelease tag
            MAIN_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || node -p "require('./package.json').version")
            echo "Base version from main: ${MAIN_VERSION}"

            NEW_TAG="v${MAIN_VERSION}"
            echo "new_version=$MAIN_VERSION" >> $GITHUB_OUTPUT
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=Beta $NEW_TAG" >> $GITHUB_OUTPUT
            echo "New tag: $NEW_TAG"

          elif [[ "$BRANCH" == "production" ]]; then
            # For production: read version from package.json, create stable release tag
            NEW_VERSION=$(node -p "require('./package.json').version")
            NEW_TAG="v${NEW_VERSION}"

            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "name=Release $NEW_TAG" >> $GITHUB_OUTPUT
            echo "New tag: $NEW_TAG"
          fi

      - name: Generate release notes
        id: release_notes
        if: github.ref_name != 'main'
        run: |
          BRANCH="${{ github.ref_name }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.bump }}"
          PR_NUMBER="${{ steps.pr_details.outputs.pr_number }}"
          PR_TITLE="${{ steps.pr_details.outputs.pr_title }}"

          # Get commits since last tag
          PREV_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | grep -v beta | head -n1)

          if [[ -z "$PREV_TAG" ]]; then
            COMMITS=$(git log --oneline -10)
          else
            COMMITS=$(git log --oneline ${PREV_TAG}..HEAD)
          fi

          # Write to file for multiline support
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          # Add PR info if available
          if [[ -n "$PR_NUMBER" ]]; then
            echo "📋 **Pull Request**: #$PR_NUMBER - $PR_TITLE" >> release_notes.md
            echo "" >> release_notes.md
          fi

          # Add version bump type indicator
          if [[ "$BUMP_TYPE" == "major" ]]; then
            echo "⚠️ **MAJOR VERSION** - Breaking changes included" >> release_notes.md
            echo "" >> release_notes.md
          elif [[ "$BUMP_TYPE" == "minor" ]]; then
            echo "✨ **MINOR VERSION** - New features added" >> release_notes.md
            echo "" >> release_notes.md
          fi

          echo "$COMMITS" | while read line; do
            if [[ -n "$line" ]]; then
              echo "- $line" >> release_notes.md
            fi
          done
          echo "" >> release_notes.md

          if [[ -n "$PREV_TAG" ]]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.get_tag.outputs.tag }}" >> release_notes.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update package.json version
        run: |
          NEW_VERSION="${{ steps.get_tag.outputs.new_version }}"
          echo "Updating package.json to version: $NEW_VERSION"

          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version

          # Commit if there are changes
          if [[ -n $(git status --porcelain package.json package-lock.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

      - name: Create tag
        if: github.ref_name != 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.get_tag.outputs.tag }}" -m "${{ steps.get_tag.outputs.name }}"
          git push origin "${{ steps.get_tag.outputs.tag }}"

      - name: Create GitHub Release
        if: github.ref_name != 'main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: ${{ steps.get_tag.outputs.name }}
          body_path: release_notes.md
          prerelease: ${{ steps.get_tag.outputs.prerelease }}
          generate_release_notes: false
